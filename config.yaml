project:
 name: autonomous-ml-platform
 version: 1.0.0

data:
 raw_path: data/raw/creditcard.csv
 processed_path: data/processed/
 drift_samples_path: data/drift_samples/

preprocessing:
 test_size: 0.2
 random_state: 42
 n_estimators: 100
 max_depth: 10
 class_weight: balanced
 cv_folds: 5

evaluation:
 primary_metric: f1_score
 thresholds:
  f1_score: 0.80
  precision: 0.80
  roc_auc: 0.90

training:
 model_type: random_forest
 test_size: 0.2
 random_state: 42
 n_estimators: 100
 max_depth: 10
 class_weight: balanced

mlflow:
 tracking_uri: http://localhost:5000
 experiment_name: fraud-detection
 model_name: fraud-classifier

serving:
 host: 0.0.0.0
 port: 8000
 model_stage: Production

monitoring:
 poll_interval_seconds: 60
 drift_threshold: 0.05
 anomaly_window: 100

sre_agent:
 poll_interval_seconds: 60
 max_retrain_per_day: 3
 rollback_on_f1_drop: 0.05
 


